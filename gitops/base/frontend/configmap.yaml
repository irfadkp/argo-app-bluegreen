apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-lamborghini-config
  labels:
    app: frontend-lamborghini
    component: ui
    shop: lamborghini
data:
  # Full URL to access backend through Ingress
  # Frontend and backend are behind the same ingress (lamborghini-shop.local)
  # Frontend at / and backend at /api
  api.url: "http://lamborghini-shop.local:30839"
  
  # Instana End User Monitoring (EUM) configuration
  instana.eum.key: "bnF0YlY1Y0VRNWV2ME1Gek9Jd3NrZw=="
  instana.eum.url: "https://eum.instana.io"

