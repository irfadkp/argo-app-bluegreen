# Preview Service (Green) - Routes traffic to new version for testing
apiVersion: v1
kind: Service
metadata:
  name: backend-lamborghini-preview
  labels:
    app: backend-lamborghini
    shop: lamborghini
spec:
  type: ClusterIP
  ports:
  - port: 3000
    targetPort: 3000
    protocol: TCP
    name: http
  selector:
    app: backend-lamborghini

---
# Active Service (Blue) - Routes production traffic to current version
apiVersion: v1
kind: Service
metadata:
  name: backend-lamborghini-active
  labels:
    app: backend-lamborghini
    shop: lamborghini
spec:
  type: ClusterIP
  ports:
  - port: 3000
    targetPort: 3000
    protocol: TCP
    name: http
  selector:
    app: backend-lamborghini

