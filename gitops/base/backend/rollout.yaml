apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: backend
  labels:
    app: backend
    app.kubernetes.io/name: backend
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: ecommerce
spec:
  replicas: 3
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: backend
      app.kubernetes.io/name: backend
      app.kubernetes.io/component: api
      app.kubernetes.io/part-of: ecommerce
  
  template:
    metadata:
      labels:
        app: backend
        app.kubernetes.io/name: backend
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: ecommerce
        component: api
    spec:
      containers:
      - name: backend
        image: ecommerce-backend
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: NODE_ENV
          value: production
        - name: PORT
          value: "3000"
        - name: DATABASE_HOST
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: database.host
        - name: DATABASE_PORT
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: database.port
        - name: DATABASE_NAME
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: database.name
        - name: DATABASE_USER
          valueFrom:
            secretKeyRef:
              name: backend-secret
              key: database.user
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: backend-secret
              key: database.password
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: backend-secret
              key: jwt.secret
        - name: INSTANA_ENABLED
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: instana.enabled
        - name: INSTANA_AGENT_HOST
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: instana.agent.host
        - name: INSTANA_AGENT_PORT
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: instana.agent.port
        - name: INSTANA_AGENT_KEY
          valueFrom:
            secretKeyRef:
              name: backend-secret
              key: instana.agent.key
        - name: INSTANA_SERVICE_NAME
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: instana.service.name
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health/live
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
  
  # Blue-Green Strategy
  strategy:
    blueGreen:
      # Active service (Blue - production)
      activeService: backend-active
      # Preview service (Green - staging)
      previewService: backend-preview
      
      # Auto promotion disabled - manual approval required
      autoPromotionEnabled: false
      
      # Scale down old version after promotion
      scaleDownDelaySeconds: 30
      
      # Number of old ReplicaSets to keep
      scaleDownDelayRevisionLimit: 1
      
      # Preview replicas (optional, defaults to spec.replicas)
      previewReplicaCount: 1

