apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: lamborghini-shop-dev

resources:
  - ../../base/database
  - ../../base/backend
  - ../../base/frontend
  - ingress.yaml
  - namespace.yaml

replicas:
  - name: frontend
    count: 1

images:
  - name: ecommerce-backend
    newName: ghcr.io/irfadkp/lamborghini-shop/backend
    newTag: "1.0.13"
  - name: ecommerce-frontend
    newName: ghcr.io/irfadkp/lamborghini-shop/frontend
    newTag: "1.0.13"

# Note: commonLabels removed to avoid conflicts with Argo Rollouts
# Argo Rollouts validates that service selectors match rollout selectors
# commonLabels would add environment: dev to rollout selector, causing mismatch

# Made with Bob
