apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: lamborghini-shop-dev

resources:
  - ../../base/database
  - ../../base/backend
  - ../../base/frontend
  - ingress.yaml
  - namespace.yaml

patches:
  - target:
      kind: Deployment
      name: frontend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1

images:
  - name: ecommerce-backend
    newName: ghcr.io/irfadkp/argo-app-bluegreen/backend
    newTag: "1.0.13"
  - name: ecommerce-frontend
    newName: ghcr.io/irfadkp/argo-app-bluegreen/frontend
    newTag: "1.0.13"

