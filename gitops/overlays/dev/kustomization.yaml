apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ecommerce-bluegreen

bases:
  - ../../base/database
  - ../../base/backend
  - ../../base/frontend

resources:
  - ingress.yaml
  - namespace.yaml

patchesStrategicMerge:
  # backend-patch.yaml removed - using Rollout instead of Deployment
  - frontend-patch.yaml

images:
  - name: ecommerce-backend
    newName: ghcr.io/irfadkp/argo-app-bluegreen/backend
    newTag: latest
  - name: ecommerce-frontend
    newName: ghcr.io/irfadkp/argo-app-bluegreen/frontend
    newTag: latest

# Note: commonLabels removed to avoid conflicts with Argo Rollouts
# Argo Rollouts validates that service selectors match rollout selectors
# commonLabels would add environment: dev to rollout selector, causing mismatch

# Made with Bob
