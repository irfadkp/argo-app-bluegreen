apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: lamborghini-shop-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/irfadkp/lamborghini-shop.git
    targetRevision: master
    path: gitops/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: lamborghini-shop-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

